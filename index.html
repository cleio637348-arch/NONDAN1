<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코코포리아 로그 백업기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-2 text-indigo-600">Ccfolia Log Converter</h1>
        <p class="text-sm text-gray-500 mb-6">코코포리아에서 다운로드한 HTML 로그를 깔끔한 TXT로 변환합니다. (PC/모바일 공용)</p>

        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-700 text-left" for="file_input">로그 파일(.html) 선택</label>
            <input id="logFile" type="file" accept=".html" 
                class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none p-2">
        </div>

        <button id="convertBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 mb-4 cursor-pointer">
            텍스트 변환 및 다운로드
        </button>

        <div id="status" class="text-sm text-gray-600 hidden bg-gray-50 p-3 rounded-lg border border-gray-200"></div>
    </div>

    <footer class="mt-6 text-xs text-gray-400">
        GitHub Pages를 통해 브라우저 자체에서 구동되므로 서버로 로그가 전송되지 않습니다.
    </footer>

    <script>
        document.getElementById('convertBtn').addEventListener('click', () => {
            const fileInput = document.getElementById('logFile');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files[0]) {
                showStatus('⚠️ 파일을 먼저 선택해 주세요.', 'text-red-500');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            showStatus('🔄 파일 읽는 중...', 'text-indigo-500');

            reader.onload = function(e) {
                try {
                    const htmlText = e.target.result;
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    
                    // 코코포리아 백업 HTML 내부의 메시지 요소 추출 (보통 p 태그나 특정 구조)
                    const paragraphs = doc.querySelectorAll('p');
                    
                    if (paragraphs.length === 0) {
                        showStatus('❌ 올바른 코코포리아 로그 파일이 아니거나 대화 내용이 없습니다.', 'text-red-500');
                        return;
                    }

                    let extractedText = '';
                    paragraphs.forEach(p => {
                        // 각 문단의 텍스트를 줄바꿈과 함께 저장
                        extractedText += p.textContent.trim() + '\n';
                    });

                    // 다운로드 실행
                    downloadTxt(extractedText, `ccfolia_backup_${Date.now()}.txt`);
                    showStatus('✅ 변환 및 다운로드 완료!', 'text-green-600');

                } catch (error) {
                    console.error(error);
                    showStatus('❌ 변환 중 오류가 발생했습니다.', 'text-red-500');
                }
            };

            // UTF-8 인코딩으로 유한하게 모바일 깨짐 방지
            reader.readAsText(file, 'UTF-8');
        });

        function downloadTxt(text, filename) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
            const link = document.createElement("a");
            
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showStatus(msg, colorClass) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `text-sm ${colorClass} bg-gray-50 p-3 rounded-lg border border-gray-200 mt-2`;
            statusDiv.innerText = msg;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
