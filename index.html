<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 코코포 로그 백업기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 캡처화면 기반 노션 스타일 다크 인터페이스 */
            --bg-main: #191919;
            --bg-surface: #202020;
            --bg-input: #252525;
            --border-notion: rgba(255, 255, 255, 0.07);
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-link: #60a5fa;

            /* 서체 설정 기본값 */
            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Noto Sans KR", "Inter", sans-serif;
            --current-font: var(--font-sans);

            /* 스크립트 내부 색상 기본 프리셋 (출력창 다크 모드) */
            --script-bg: #202020;
            --script-text: rgba(255, 255, 255, 0.9);
            --script-name: #e56363;
            --script-narrator: #ffffff;
            --script-sys: #888888;
            --script-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: var(--font-sans);
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 16px;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-notion);
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 6px 0;
        }

        .notion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-notion);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .notion-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .output-room-title {
            font-family: var(--font-sans);
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 16px 0;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .accordion-icon { font-size: 0.8rem; color: var(--text-muted); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: none; margin-top: 14px; }

        .grid-config { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .grid-config { grid-template-columns: repeat(2, 1fr); } }

        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        input[type="text"], input[type="file"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            border-radius: 6px; color: var(--text-main); font-size: 0.85rem; padding: 10px; box-sizing: border-box; outline: none;
        }

        .switch-group {
            display: flex; gap: 16px; background: var(--bg-input); padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border-notion);
        }
        .switch-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
        .switch-item input { accent-color: var(--text-link); cursor: pointer; }

        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 6px; }
        .filter-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
        .filter-item input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--text-link); }

        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .notion-btn {
            background: none; border: 1px solid var(--border-notion); color: var(--text-main);
            border-radius: 6px; cursor: pointer; padding: 10px 16px; font-size: 0.85rem; transition: 0.2s; font-weight: 600;
        }
        .btn-submit { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); flex: 2; }
        .btn-submit:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-util { flex: 1; border-color: rgba(96, 165, 250, 0.2); color: var(--text-link); }
        .btn-util:hover { background: rgba(96, 165, 250, 0.1); }

        /* 로그 세션 출력 전용 콘테이너 */
        .script-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: var(--script-bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--script-border);
        }

        /* 캡처화면 기반 우측 고정 삭제버튼 레이아웃 구조 */
        .notion-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 12px; 
            padding: 6px 8px; 
            border-radius: 4px;
            transition: background 0.15s;
        }
        .notion-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .content-cell {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }

        .avatar-box { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); background: #333; }
        .avatar-placeholder { width: 32px; flex-shrink: 0; }
        
        .notion-block {
            flex: 1; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            word-break: break-all; 
            outline: none; 
            color: var(--script-text); 
            white-space: pre-wrap;
            font-family: var(--current-font);
        }
        
        .char-name { 
            font-size: 0.8rem; 
            font-weight: 700; 
            margin-bottom: 2px; 
            display: block; 
            color: var(--script-name); 
            font-family: var(--font-sans);
        }

        .state-narrator { font-weight: 500; color: var(--script-narrator) !important; }
        .state-system { font-family: var(--font-sans); font-size: 0.85rem; color: var(--script-sys) !important; }

        /* 주사위 강조 삭제 (일반 텍스트와 완벽 동일) */
        .state-dice { background: none !important; border: none !important; color: var(--script-text) !important; padding: 0 !important; }

        /* 우측 정렬 del 영역 */
        .control-cell {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-control { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: #ff6b6b; 
            cursor: pointer; 
            font-size: 0.75rem; 
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .row-control:hover { background: rgba(255, 107, 107, 0.15); border-color: #ff6b6b; color: #ffffff; }
        
        .character-divider { border-top: 1px solid rgba(255, 255, 255, 0.03); margin: 6px 0 2px 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>논단군 코코포 로그 백업기</h1>
    </header>

    <div class="notion-card">
        <div class="notion-label">설정 센터</div>
        <div class="grid-config" style="margin-bottom: 12px;">
            <div class="input-group">
                <span>1. 백업 로그 업로드 (.html)</span>
                <input id="logFile" type="file" accept=".html">
            </div>
            <div class="input-group">
                <span>2. 지문 서술자 이름 지정 (선택)</span>
                <input id="narratorName" type="text" placeholder="예: GM 또는 서술자">
            </div>
        </div>

        <div class="grid-config">
            <div class="input-group">
                <span>3. 본문 스타일 선택</span>
                <div class="switch-group" id="themeSwitchGroup">
                    <label class="switch-item">
                        <input type="radio" name="colorTheme" value="roll20" checked> Roll20 색상
                    </label>
                    <label class="switch-item">
                        <input type="radio" name="colorTheme" value="ccfolia"> 코코포리아 색상
                    </label>
                </div>
            </div>
            <div class="input-group">
                <span>4. 서체 선택</span>
                <div class="switch-group">
                    <label class="switch-item">
                        <input type="radio" name="fontPreset" value="sans" checked> 고딕
                    </label>
                    <label class="switch-item">
                        <input type="radio" name="fontPreset" value="serif"> 명조
                    </label>
                </div>
            </div>
        </div>
        
        <div class="input-group" style="margin-top: 10px;">
            <span>5. 탭 필터링</span>
            <div id="dynamicFilters" class="filter-container">
                <p style="font-size: 0.8rem; color: var(--text-muted);">파일을 먼저 업로드하세요.</p>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="btnProcess" class="notion-btn btn-submit">스크립트 가공 실행</button>
        <button id="btnCopy" class="notion-btn btn-util">코드 복사</button>
        <button id="btnDownload" class="notion-btn btn-util">파일로 저장</button>
    </div>

    <div id="mainOutputCard" class="notion-card">
        <div class="notion-label">결과 출력 창</div>
        <h2 id="roomTitle" class="output-room-title" contenteditable="true" spellcheck="false">ccfolia - logs</h2>
        <div id="mainContainer" class="script-container"></div>
    </div>

    <div id="dynamicTabsOutput"></div>

    <script>
        let rawLogData = [];
        let characterAvatars = {}; 
        let detectedTabs = new Set();
        let currentFontType = "sans"; 
        let currentColorTheme = "roll20";

        /* 최종 저장 파일에 적용될 색상값 분리 정의 */
        const themeProfiles = {
            roll20: {
                bg: "#f3f3f3", text: "#111111", name: "#b51212", narrator: "#222222", sys: "#666666", border: "#dddddd"
            },
            ccfolia: {
                bg: "#1a1a1a", text: "#ffffff", name: "#4da6ff", narrator: "#e0e0e0", sys: "#888888", border: "#2d2d2d"
            }
        };

        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            content.classList.toggle('open');
            const arrow = document.getElementById(arrowId);
            arrow.innerText = content.classList.contains('open') ? '▼' : '▶';
        }

        document.querySelectorAll('input[name="colorTheme"]').forEach(radio => {
            radio.addEventListener('change', (e) => { currentColorTheme = e.target.value; });
        });

        document.querySelectorAll('input[name="fontPreset"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentFontType = e.target.value;
                const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";
                document.documentElement.style.setProperty('--current-font', fontValue);
                document.querySelectorAll('.notion-block').forEach(el => el.style.fontFamily = fontValue);
            });
        });

        /* [핵심 수정] 코코포리아 백업 HTML 원본 노드의 깨진 파싱 처리 교정 */
        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                
                document.getElementById('roomTitle').innerText = file.name.replace(/\.html$/i, "").replace(/\[all\]$/i, "").trim();

                // 원본 p 태그 내부 추출 고도화
                let paragraphs = doc.querySelectorAll('p');
                rawLogData = [];
                detectedTabs.clear();

                paragraphs.forEach(p => {
                    const text = p.textContent.trim();
                    if(!text) return;

                    // 인장 스캔
                    let avatarSrc = "";
                    let imgEl = p.querySelector('img') || p.previousElementSibling?.querySelector('img');
                    if (imgEl && imgEl.getAttribute('src')) {
                        avatarSrc = imgEl.getAttribute('src');
                    }

                    // 정규식 매칭 분리 [탭] 이름 : 대사
                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim();
                        let charName = match[2].trim();
                        let msgBody = match[3].trim();
                        
                        // 타임스탬프 필터링
                        const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                        if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                        detectedTabs.add(tabName);
                        if(charName.toUpperCase() === "SYSTEM" || charName === "시스템") {
                            rawLogData.push({ tab: "시스템", name: "", message: msgBody, avatar: "" });
                        } else {
                            rawLogData.push({ tab: tabName, name: charName, message: msgBody, avatar: avatarSrc });
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        }
                    } else {
                        // 일반 이름 : 대사 포맷
                        const simpleMatch = text.match(/^([^:]+)\s*:\s*([\s\S]*)$/);
                        if(simpleMatch) {
                            let charName = simpleMatch[1].trim();
                            let msgBody = simpleMatch[2].trim();
                            
                            const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                            if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                            detectedTabs.add("main");
                            rawLogData.push({ tab: "main", name: charName, message: msgBody, avatar: avatarSrc });
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        } else {
                            if(text.length > 0) {
                                rawLogData.push({ tab: "시스템", name: "", message: text, avatar: "" });
                            }
                        }
                    }
                });

                buildFilters();
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters');
            container.innerHTML = "";
            if(detectedTabs.size === 0) {
                container.innerHTML = `<p style="font-size: 0.8rem; color: var(--text-muted);">감지된 탭이 없습니다.</p>`;
                return;
            }
            Array.from(detectedTabs).sort().forEach(tab => {
                const label = document.createElement('label');
                label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        /* 가공 실행 함수 */
        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('파일을 먼저 업로드해 주세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            
            const mainContainer = document.getElementById('mainContainer');
            const dynamicTabsOutput = document.getElementById('dynamicTabsOutput');
            mainContainer.innerHTML = "";
            dynamicTabsOutput.innerHTML = "";

            const tabGroups = {};
            selectedTabs.forEach(t => {
                if(t.toLowerCase() === 'main' || t.includes('메인') || selectedTabs.length === 1) {
                    tabGroups[t] = mainContainer;
                } else {
                    const card = document.createElement('div');
                    card.className = "notion-card";
                    const id = `tab_sec_${t.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    card.innerHTML = `
                        <div class="accordion-header" onclick="toggleAccordion('${id}', 'arr_${id}')">
                            <div class="notion-label" style="margin-bottom:0;">[${t}] 채널 로그</div>
                            <div class="accordion-icon" id="arr_${id}">▶</div>
                        </div>
                        <div id="${id}" class="accordion-content script-container" style="margin-top:10px;"></div>`;
                    dynamicTabsOutput.appendChild(card);
                    tabGroups[t] = card.querySelector('.accordion-content');
                }
            });

            let lastSpeakers = {}; 
            const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";

            rawLogData.forEach(log => {
                if(log.tab !== "시스템" && !selectedTabs.includes(log.tab) && selectedTabs.length > 0) return;
                
                const target = tabGroups[log.tab] || mainContainer;
                const isNarrator = narrator && log.name === narrator;
                const isSys = log.tab === "시스템" || log.name === "";
                const currentSpeaker = log.name;

                let forceShowName = false;
                if (!isSys && !isNarrator && (lastSpeakers[log.tab] === "__SYS__" || lastSpeakers[log.tab] === "__NARR__")) {
                    forceShowName = true;
                }

                if (!isNarrator && !isSys && lastSpeakers[log.tab] && lastSpeakers[log.tab] !== currentSpeaker) {
                    const divider = document.createElement('div');
                    divider.className = "character-divider";
                    target.appendChild(divider);
                }

                let isSameSpeaker = (!forceShowName && !isNarrator && !isSys && lastSpeakers[log.tab] === currentSpeaker);
                
                if (isSys) lastSpeakers[log.tab] = "__SYS__";
                else if (isNarrator) lastSpeakers[log.tab] = "__NARR__";
                else lastSpeakers[log.tab] = currentSpeaker;

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = currentSpeaker;
                row.dataset.tab = log.tab;

                let msgClass = "notion-block";
                if(isSys) msgClass += " state-system";
                if(isNarrator) msgClass += " state-narrator";

                let inner = `<div class="content-cell">`;
                if(!isNarrator && !isSys) {
                    if(!isSameSpeaker) {
                        const avatar = characterAvatars[currentSpeaker] || log.avatar;
                        inner += avatar ? `<img src="${avatar}" class="avatar-box" data-raw-src="${avatar}">` : `<div class="avatar-box"></div>`;
                    } else {
                        inner += `<div class="avatar-placeholder"></div>`;
                    }
                    inner += `<div style="flex:1;">
                        ${!isSameSpeaker ? `<span class="char-name">${currentSpeaker}</span>` : ''}
                        <div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>
                    </div>`;
                } else {
                    inner += `<div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>`;
                }
                inner += `</div>`;
                
                // 우측 배치형 삭제 버튼 고정 정렬
                inner += `<div class="control-cell"><button class="row-control" onclick="this.parentElement.parentElement.remove()">×</button></div>`;
                
                row.innerHTML = inner;
                target.appendChild(row);
            });
        });

        /* 최종 추출 파일 빌더 */
        function buildFinal() {
            const finalTitle = document.getElementById('roomTitle').innerText.trim() || "TRPG 로그 백업 스크립트";
            const chosenFontStack = currentFontType === "serif" ? `'Hina Mincho', 'Noto Serif KR', serif` : `'Noto Sans KR', sans-serif`;
            const p = themeProfiles[currentColorTheme];

            let output = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${finalTitle}</title>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                body { background:#191919; color:rgba(255,255,255,0.85); font-family: 'Noto Sans KR', sans-serif; max-width:750px; margin:0 auto; padding:30px 20px; }
                h1 { font-family: 'Noto Sans KR', sans-serif; font-size:1.5rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:12px; margin-bottom:20px; color:#fff; }
                .script-box { display: flex; flex-direction: column; gap: 4px; background:${p.bg}; padding:16px; border-radius:8px; border:1px solid ${p.border}; }
                .row { display:flex; align-items:flex-start; gap:10px; padding: 6px 8px; }
                .avatar { width:32px; height:32px; border-radius:4px; object-fit:cover; flex-shrink:0; border:1px solid rgba(255,255,255,0.05); background:#333; }
                .name { font-size:0.8rem; font-weight:700; margin-bottom:2px; display:block; color:${p.name}; font-family: 'Noto Sans KR', sans-serif; }
                .msg { font-family: ${chosenFontStack}; font-size:0.95rem; line-height:1.5; white-space:pre-wrap; word-break:break-all; flex:1; color:${p.text}; }
                .narrator { font-weight:500; color:${p.narrator}; }
                .system { color:${p.sys}; font-size:0.85rem; font-family: 'Noto Sans KR', sans-serif; }
                .divider { border-top: 1px solid rgba(255,255,255,0.03); margin:6px 0 2px 0; }
                details { background:#202020; border:1px solid rgba(255,255,255,0.07); border-radius:8px; padding:12px; margin-top:16px; }
                summary { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.4); cursor:pointer; }
            </style></head><body><h1>${finalTitle}</h1><div class="script-box">`;

            function processContainer(nodes) {
                let res = ""; let last = "";
                nodes.forEach(el => {
                    if(el.classList.contains('character-divider')) { res += '<div class="divider"></div>'; return; }
                    const isNarr = el.querySelector('.state-narrator');
                    const isSys = el.querySelector('.state-system');
                    const spk = el.dataset.speaker || "";
                    const same = (last === spk && !isNarr && !isSys);
                    last = isNarr ? "__N__" : (isSys ? "__S__" : spk);

                    res += '<div class="row">';
                    if(!isNarr && !isSys) {
                        const imgBox = el.querySelector('.avatar-box');
                        const img = imgBox?.getAttribute('src') || imgBox?.dataset.rawSrc;
                        
                        if(img && !same) res += `<img src="${img}" class="avatar">`;
                        else if(!same) res += `<div class="avatar"></div>`;
                        else res += `<div style="width:32px;flex-shrink:0"></div>`;
                        
                        res += '<div style="flex:1;">';
                        if(!same) res += `<span class="name">${spk}</span>`;
                        const blockEl = el.querySelector('.notion-block');
                        res += `<div class="msg">${blockEl ? blockEl.innerText : ""}</div></div>`;
                    } else {
                        const contentNode = el.querySelector('.notion-block');
                        res += `<div class="msg ${isNarr?'narrator':(isSys?'system':'')}">${contentNode ? contentNode.innerText : el.textContent}</div>`;
                    }
                    res += '</div>';
                });
                return res;
            }

            output += processContainer(document.querySelectorAll('#mainContainer > div'));
            output += '</div>';
            
            document.querySelectorAll('#dynamicTabsOutput > .notion-card').forEach(card => {
                const title = card.querySelector('.notion-label').innerText;
                const nodes = card.querySelectorAll('.script-container > div');
                output += `<details><summary>${title}</summary><div class="script-box" style="margin-top:8px;">${processContainer(nodes)}</div></details>`;
            });

            output += '</body></html>';
            return output;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinal()).then(() => alert('코드가 복사되었습니다.'));
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinal()], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${document.getElementById('roomTitle').innerText || 'log'}.html`);
            link.click();
        });

        function escapeHtml(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
