<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 스크립트 정리 Pro - Aesthetic Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #191919;
            --bg-surface: #202020;
            --bg-input: #252525;
            --border-notion: rgba(255, 255, 255, 0.07);
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-kp: #4ade80;
            --text-check: #f87171;
            --text-link: #60a5fa;
            --bg-check: rgba(239, 68, 68, 0.15); 
            /* 서리프/명조체 스택 (한자 전용 서체 포함) */
            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 16px;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-notion);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 6px 0;
            letter-spacing: -0.03em;
        }

        .notion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-notion);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .notion-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* 결과 출력창 룸 제목 - 한자가 섞여도 고급지게 */
        .output-room-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 20px 0;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
        }
        .accordion-icon { font-size: 0.8rem; transition: transform 0.2s; color: var(--text-muted); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: none; margin-top: 16px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .input-group span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        input[type="text"], input[type="file"], input[type="color"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            border-radius: 6px; color: var(--text-main); font-size: 0.9rem; padding: 12px; box-sizing: border-box; outline: none;
        }

        /* 추출 필터 체크박스 */
        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 8px; }
        .filter-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
        .filter-item input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text-link); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 24px; }
        .notion-btn {
            background: none; border: 1px solid var(--border-notion); color: var(--text-main);
            border-radius: 6px; cursor: pointer; padding: 12px 20px; font-size: 0.9rem; transition: 0.2s; font-weight: 600;
        }
        .btn-submit { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); flex: 2; }
        .btn-submit:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-util { flex: 1; border-color: rgba(96, 165, 250, 0.2); color: var(--text-link); }
        .btn-util:hover { background: rgba(96, 165, 250, 0.1); }

        /* [요구사항] 스크립트 본문 명조체(세리프) 강화 및 가독성 레이아웃 */
        .notion-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }
        .avatar-box { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-notion); }
        .avatar-placeholder { width: 40px; flex-shrink: 0; }
        
        .notion-block {
            flex: 1; padding: 6px 10px; border-radius: 4px; font-size: 0.95rem; line-height: 1.7;
            word-break: break-all; outline: none; color: var(--text-main); white-space: pre-wrap;
            /* 한자가 섞여도 고급스러운 분위기 연출 */
            font-family: var(--font-serif);
        }
        .notion-block:focus { background: var(--bg-input); }
        .char-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; display: block; color: var(--text-link); }

        /* 지문/진행 모드 */
        .state-narrator { text-align: center; font-weight: 600; font-style: italic; color: rgba(255, 255, 255, 0.7); width: 100%; margin: 6px 0; padding: 6px 20px; font-size: 1rem; border: none !important; }
        
        /* 시스템 모드 (왼쪽 바 제거) */
        .state-system { font-family: var(--font-sans); font-size: 0.85rem; color: #888888; background-color: transparent; padding: 2px 10px; border: none !important; }
        .state-dice { background-color: var(--bg-check); color: var(--text-check); border-left: 3px solid var(--text-check) !important; font-weight: 500; font-family: var(--font-sans); }

        .row-control { padding: 4px 10px; border: 1px solid var(--border-notion); background: rgba(255,255,255,0.02); color: var(--text-check); border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin-top: 4px; }
        .character-divider { border-top: 1px dashed var(--border-notion); margin: 16px 0 12px 0; width: 100%; }
        .hidden { display: none !important; }

        .checker-badge { display: inline-block; font-size: 0.7rem; background: rgba(234, 179, 8, 0.15); color: #fde047; padding: 1px 6px; border-radius: 3px; border: 1px solid rgba(234, 179, 8, 0.3); margin-bottom: 6px; font-family: var(--font-sans); }
    </style>
</head>
<body>

    <header>
        <h1>논단군 스크립트 정리 Pro</h1>
        <p>Aesthetic TRPG Log Engine</p>
    </header>

    <div class="notion-card">
        <div class="notion-label">설정 센터</div>
        <div class="grid-config">
            <div class="input-group">
                <span>1. 로그 파일 업로드 (.html)</span>
                <input id="logFile" type="file" accept=".html">
            </div>
            <div class="input-group">
                <span>2. 지문 서술자 이름 지정</span>
                <input id="narratorName" type="text" placeholder="예: GM 또는 서술자">
            </div>
        </div>
        
        <div class="input-group" style="margin-top: 10px;">
            <span>3. 추출할 탭 필터링 (자동 감지됨)</span>
            <div id="dynamicFilters" class="filter-container">
                <p style="font-size: 0.8rem; color: var(--text-muted);">파일을 먼저 업로드하세요.</p>
            </div>
        </div>
    </div>

    <div id="colorCard" class="notion-card hidden">
        <div class="accordion-header" onclick="toggleAccordion('colorSettingsContainer', 'accordionArrow')">
            <div class="notion-label" style="margin-bottom: 0;">캐릭터 대사 색상 설정</div>
            <div class="accordion-icon" id="accordionArrow">▶</div>
        </div>
        <div id="colorSettingsContainer" class="accordion-content grid-config" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));"></div>
    </div>

    <div class="btn-group">
        <button id="btnProcess" class="notion-btn btn-submit">실행</button>
        <button id="btnCopy" class="notion-btn btn-util">전체 코드 복사</button>
        <button id="btnDownload" class="notion-btn btn-util">파일로 저장</button>
    </div>

    <div id="mainOutputCard" class="notion-card">
        <div class="notion-label">메인 세션 로그 (Main)</div>
        <h2 id="roomTitle" class="output-room-title" contenteditable="true" spellcheck="false">파일을 기다리는 중...</h2>
        <div id="mainContainer"></div>
    </div>

    <div id="dynamicTabsOutput"></div>

    <script>
        let rawLogData = [];
        let characterColors = {}; 
        let characterAvatars = {}; 
        let detectedTabs = new Set();

        const spellRules = [
            { regex: /됫/g, fix: "됐" }, { regex: /됬/g, fix: "됐" }, { regex: /않하고/g, fix: "안 하고" }, 
            { regex: /않돼/g, fix: "안 돼" }, { regex: /구지/g, fix: "굳이" }, { regex: /할께/g, fix: "할게" }
        ];

        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            content.classList.toggle('open');
            arrow.innerText = content.classList.contains('open') ? '▼' : '▶';
        }

        // 파일 로드 및 탭/캐릭터 자동 인식
        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                
                // 파일명 정제 (제목)
                document.getElementById('roomTitle').innerText = file.name.replace(/\.html$/i, "").replace(/\[all\]$/i, "").trim();

                const paragraphs = doc.querySelectorAll('p');
                rawLogData = [];
                detectedTabs.clear();
                const uniqueCharacters = new Set();

                paragraphs.forEach(p => {
                    let avatarSrc = p.querySelector('img')?.getAttribute('src') || "";
                    let color = p.querySelector('span[style*="color"]')?.style.color || "";
                    const text = p.textContent.trim();
                    if(!text) return;

                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim();
                        let charName = match[2].trim();
                        let msgBody = match[3].trim();
                        const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                        if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                        detectedTabs.add(tabName);
                        if(charName.toUpperCase() === "SYSTEM" || charName === "시스템") {
                            rawLogData.push({ tab: "시스템", name: "", message: msgBody, rawColor: "", avatar: "" });
                        } else {
                            rawLogData.push({ tab: tabName, name: charName, message: msgBody, rawColor: color, avatar: avatarSrc });
                            uniqueCharacters.add(charName);
                            if(color && !characterColors[charName]) characterColors[charName] = rgbToHex(color);
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        }
                    } else {
                        rawLogData.push({ tab: "시스템", name: "", message: text, rawColor: "", avatar: "" });
                    }
                });

                buildFilters();
                buildColorSettings(uniqueCharacters);
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters');
            container.innerHTML = "";
            Array.from(detectedTabs).sort().forEach(tab => {
                const label = document.createElement('label');
                label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        function buildColorSettings(charSet) {
            const container = document.getElementById('colorSettingsContainer');
            container.innerHTML = "";
            if(charSet.size === 0) { document.getElementById('colorCard').classList.add('hidden'); return; }
            charSet.forEach(name => {
                const row = document.createElement('div');
                row.className = "color-setting-row";
                row.innerHTML = `<span>${name}</span><input type="color" value="${characterColors[name] || '#ffffff'}" onchange="characterColors['${name}'] = this.value">`;
                container.appendChild(row);
            });
            document.getElementById('colorCard').classList.remove('hidden');
        }

        function rgbToHex(rgb) {
            if(!rgb || !rgb.startsWith('rgb')) return rgb || "#ffffff";
            const parts = rgb.match(/\d+/g);
            return parts ? "#" + parts.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('') : "#ffffff";
        }

        // [핵심] 캐릭터 이름 유실 방지 및 다중 탭 토글 렌더링
        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('파일을 로드하세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            
            const mainContainer = document.getElementById('mainContainer');
            const dynamicTabsOutput = document.getElementById('dynamicTabsOutput');
            mainContainer.innerHTML = "";
            dynamicTabsOutput.innerHTML = "";

            // 탭별 컨테이너 생성
            const tabGroups = {};
            selectedTabs.forEach(t => {
                if(t.includes('메인') || t.toLowerCase() === 'main') {
                    tabGroups[t] = mainContainer;
                } else {
                    const card = document.createElement('div');
                    card.className = "notion-card";
                    const id = `tab_sec_${t}`;
                    card.innerHTML = `
                        <div class="accordion-header" onclick="toggleAccordion('${id}', 'arr_${id}')">
                            <div class="notion-label" style="margin-bottom:0;">[${t}] 채널 로그</div>
                            <div class="accordion-icon" id="arr_${id}">▶</div>
                        </div>
                        <div id="${id}" class="accordion-content"></div>`;
                    dynamicTabsOutput.appendChild(card);
                    tabGroups[t] = card.querySelector('.accordion-content');
                }
            });

            let lastSpeakers = {}; // 탭별 직전 발화자 추적

            rawLogData.forEach(log => {
                if(log.tab !== "시스템" && !selectedTabs.includes(log.tab)) return;
                
                const target = tabGroups[log.tab] || mainContainer;
                const isNarrator = narrator && log.name === narrator;
                const isSys = log.tab === "시스템";
                const currentSpeaker = log.name;

                // [요구사항] 지문 사이에 캐릭터가 껴도 이름이 표시되도록 로직 강화
                // 직전 발화자가 시스템이거나 지문이었으면, 다시 이름을 강제로 표시함
                let forceShowName = false;
                if (!isSys && !isNarrator && (lastSpeakers[log.tab] === "__SYS__" || lastSpeakers[log.tab] === "__NARR__")) {
                    forceShowName = true;
                }

                if (!isNarrator && !isSys && lastSpeakers[log.tab] && lastSpeakers[log.tab] !== currentSpeaker) {
                    const divider = document.createElement('div');
                    divider.className = "character-divider";
                    target.appendChild(divider);
                }

                let isSameSpeaker = (!forceShowName && !isNarrator && !isSys && lastSpeakers[log.tab] === currentSpeaker);
                
                // 상태 업데이트
                if (isSys) lastSpeakers[log.tab] = "__SYS__";
                else if (isNarrator) lastSpeakers[log.tab] = "__NARR__";
                else lastSpeakers[log.tab] = currentSpeaker;

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = currentSpeaker;
                row.dataset.tab = log.tab;

                let msgClass = "notion-block";
                if(log.message.includes('🎲') || log.message.includes('->')) msgClass += " state-dice";
                if(isSys) msgClass += " state-system";
                if(isNarrator) msgClass += " state-narrator";

                let inner = "";
                if(!isNarrator && !isSys) {
                    if(!isSameSpeaker) {
                        const avatar = characterAvatars[currentSpeaker] || log.avatar;
                        inner += avatar ? `<img src="${avatar}" class="avatar-box">` : `<div class="avatar-box" style="background:#333"></div>`;
                    } else {
                        inner += `<div class="avatar-placeholder"></div>`;
                    }
                    inner += `<div style="flex:1;">
                        ${!isSameSpeaker ? `<span class="char-name" style="color:${characterColors[currentSpeaker] || 'inherit'}">${currentSpeaker}</span>` : ''}
                        <div class="${msgClass}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>
                    </div>`;
                } else {
                    inner += `<div class="${msgClass}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>`;
                }
                
                inner += `<button class="row-control" onclick="this.parentElement.remove()">✕</button>`;
                row.innerHTML = inner;
                target.appendChild(row);
            });
        });

        // 결과 빌드 (수정된 제목 및 모든 탭 포함)
        function buildFinal() {
            const finalTitle = document.getElementById('roomTitle').innerText.trim();
            const sections = document.querySelectorAll('.notion-card');
            
            let output = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${finalTitle}</title>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                body { background:#191919; color:rgba(255,255,255,0.85); font-family: sans-serif; max-width:750px; margin:0 auto; padding:40px 20px; }
                h1 { font-family: "Hina Mincho", "Noto Serif KR", serif; font-size:2rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:30px; }
                .tab-title { font-size:0.8rem; font-weight:700; color:#60a5fa; text-transform:uppercase; margin:40px 0 10px 0; opacity:0.6; }
                .row { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
                .avatar { width:36px; height:36px; border-radius:4px; object-fit:cover; flex-shrink:0; }
                .name { font-size:0.85rem; font-weight:700; margin-bottom:4px; display:block; }
                .msg { font-family: "Hina Mincho", "Noto Serif KR", serif; font-size:0.95rem; line-height:1.7; white-space:pre-wrap; word-break:break-all; flex:1; }
                .narrator { text-align:center; font-weight:600; font-style:italic; opacity:0.8; padding:10px 0; }
                .system { color:#888; font-size:0.85rem; font-family: sans-serif; }
                .dice { background:rgba(239,68,68,0.1); color:#f87171; border-left:3px solid #f87171; padding:4px 10px; border-radius:4px; font-family: sans-serif; }
                .divider { border-top:1px dashed rgba(255,255,255,0.1); margin:15px 0; }
                details { background:#222; border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:15px; margin-top:20px; }
                summary { font-size:0.9rem; font-weight:700; color:rgba(255,255,255,0.5); cursor:pointer; }
            </style></head><body><h1>${finalTitle}</h1>`;

            function processContainer(nodes, isDetail = false) {
                let res = ""; let last = "";
                nodes.forEach(el => {
                    if(el.classList.contains('character-divider')) { res += '<div class="divider"></div>'; return; }
                    const isNarr = el.querySelector('.state-narrator');
                    const isDice = el.querySelector('.state-dice');
                    const isSys = el.querySelector('.state-system');
                    const spk = el.dataset.speaker;
                    const same = (last === spk && !isNarr && !isSys);
                    last = isNarr ? "__N__" : (isSys ? "__S__" : spk);

                    res += '<div class="row">';
                    if(!isNarr && !isSys) {
                        const img = el.querySelector('.avatar-box')?.src;
                        if(img && !same) res += `<img src="${img}" class="avatar">`;
                        else if(!same) res += `<div class="avatar" style="background:#333"></div>`;
                        else res += `<div style="width:36px;flex-shrink:0"></div>`;
                        res += '<div>';
                        if(!same) res += `<span class="name" style="color:${el.querySelector('.char-name')?.style.color}">${spk}</span>`;
                        res += `<div class="msg ${isDice?'dice':''}">${el.querySelector('.notion-block').innerText}</div></div>`;
                    } else {
                        res += `<div class="msg ${isNarr?'narrator':(isSys?'system':'')}">${el.querySelector('.notion-block').innerText}</div>`;
                    }
                    res += '</div>';
                });
                return res;
            }

            output += processContainer(document.querySelectorAll('#mainContainer > div'));
            
            document.querySelectorAll('#dynamicTabsOutput > .notion-card').forEach(card => {
                const title = card.querySelector('.notion-label').innerText;
                const nodes = card.querySelectorAll('.accordion-content > div');
                output += `<details><summary>${title}</summary>${processContainer(nodes)}</details>`;
            });

            output += '</body></html>';
            return output;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinal()).then(() => alert('복사되었습니다.'));
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinal()], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${document.getElementById('roomTitle').innerText}.html`);
            link.click();
        });

        function escapeHtml(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
