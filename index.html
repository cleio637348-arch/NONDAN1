<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 코코포 로그 백업</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #191919;
            --bg-surface: #202020;
            --bg-input: #252525;
            --border-notion: rgba(255, 255, 255, 0.07);
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.4);
            --text-kp: #4ade80;
            --text-check: #f87171;
            --text-link: #60a5fa;
            --bg-check: rgba(239, 68, 68, 0.15); 
            
            /* 서체 기본 프리셋 */
            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Noto Sans KR", "Inter", sans-serif;
            
            /* 기본값은 세리프(명조)로 설정 */
            --current-font: var(--font-sans-serif);
        }

        body {
            font-family: var(--font-sans);
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 16px;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-notion);
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }

        .notion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-notion);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .notion-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .output-room-title {
            font-family: var(--current-font);
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 16px 0;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 2px 0;
        }
        .accordion-icon { font-size: 0.8rem; transition: transform 0.2s; color: var(--text-muted); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: none; margin-top: 14px; }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        @media (min-width: 600px) {
            .grid-config { grid-template-columns: repeat(2, 1fr); }
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .input-group span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        input[type="text"], input[type="file"], input[type="color"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            border-radius: 6px; color: var(--text-main); font-size: 0.85rem; padding: 10px; box-sizing: border-box; outline: none;
        }

        /* 서체 스위치 라디오 스타일 */
        .font-switch-group {
            display: flex;
            gap: 16px;
            background: var(--bg-input);
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-notion);
        }
        .font-switch-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .font-switch-item input {
            accent-color: var(--text-link);
            cursor: pointer;
        }

        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 6px; }
        .filter-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
        .filter-item input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--text-link); }

        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .notion-btn {
            background: none; border: 1px solid var(--border-notion); color: var(--text-main);
            border-radius: 6px; cursor: pointer; padding: 10px 16px; font-size: 0.85rem; transition: 0.2s; font-weight: 600;
        }
        .btn-submit { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); flex: 2; }
        .btn-submit:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-util { flex: 1; border-color: rgba(96, 165, 250, 0.2); color: var(--text-link); }
        .btn-util:hover { background: rgba(96, 165, 250, 0.1); }

        /* 롤20 컴팩트 스펙 레이아웃 */
        .script-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .notion-row { 
            display: flex; 
            align-items: flex-start; 
            gap: 8px; 
            padding: 2px 4px; 
            margin-bottom: 0px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.01); 
        }
        
        .avatar-box { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-notion); }
        .avatar-placeholder { width: 28px; flex-shrink: 0; }
        
        .notion-block {
            flex: 1; 
            padding: 2px 4px; 
            border-radius: 4px; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            word-break: break-all; 
            outline: none; 
            color: var(--text-main); 
            white-space: pre-wrap;
            font-family: var(--current-font);
        }
        .notion-block:focus { background: var(--bg-input); }
        
        .char-name { 
            font-size: 0.8rem; 
            font-weight: 700; 
            margin-bottom: 1px; 
            display: block; 
            color: var(--text-link); 
            font-family: var(--font-sans);
        }

        /* [요구사항] 서술자 지문 위아래로 아주 미세한 공백 설정 (margin: 8px 0) */
        .state-narrator { 
            text-align: center; 
            font-weight: 600; 
            font-style: italic; 
            color: rgba(255, 255, 255, 0.65); 
            width: 100%; 
            margin: 8px 0; 
            padding: 3px 10px; 
            font-size: 0.9rem; 
            border: none !important; 
        }
        
        .state-system { font-family: var(--font-sans); font-size: 0.8rem; color: #777777; background-color: transparent; padding: 1px 4px; border: none !important; }
        .state-dice { background-color: var(--bg-check); color: var(--text-check); border-left: 2px solid var(--text-check) !important; font-weight: 500; font-family: var(--font-sans); padding: 2px 6px; }

        .row-control { padding: 1px 6px; border: 1px solid var(--border-notion); background: rgba(255,255,255,0.02); color: var(--text-check); border-radius: 4px; cursor: pointer; font-size: 0.65rem; align-self: center; margin-left: 4px; opacity: 0.3; transition: opacity 0.2s; }
        .notion-row:hover .row-control { opacity: 1; }
        
        .character-divider { border-top: 1px solid rgba(255, 255, 255, 0.04); margin: 4px 0 2px 0; width: 100%; }
        .hidden { display: none !important; }

        .checker-badge { display: inline-block; font-size: 0.65rem; background: rgba(234, 179, 8, 0.12); color: #eab308; padding: 0px 4px; border-radius: 3px; border: 1px solid rgba(234, 179, 8, 0.2); margin-bottom: 2px; font-family: var(--font-sans); }
    </style>
</head>
<body>

    <header>
        <h1>논단군 코코포리아 로그 백업</h1>
        <p>코코포리아 로그 백업기</p>
    </header>

    <div class="notion-card">
        <div class="notion-label">설정</div>
        <div class="grid-config" style="margin-bottom: 12px;">
            <div class="input-group">
                <span>1. 로그 파일 업로드 (.html)</span>
                <input id="logFile" type="file" accept=".html">
            </div>
            <div class="input-group">
                <span>2. 서술자 이름 지정</span>
                <input id="narratorName" type="text" placeholder="예: GM 또는 서술자">
            </div>
        </div>

        <div class="grid-config">
            <div class="input-group">
                <span>3. 서체 선택</span>
                <div class="font-switch-group">
                    <label class="font-switch-item">
                        <input type="radio" name="fontPreset" value="serif" checked> 고급 명조체 (Serif)
                    </label>
                    <label class="font-switch-item">
                        <input type="radio" name="fontPreset" value="sans"> 깔끔 고딕체 (Gothic)
                    </label>
                </div>
            </div>
        </div>
        
        <div class="input-group" style="margin-top: 10px;">
            <span>4. 추출 탭</span>
            <div id="dynamicFilters" class="filter-container">
                <p style="font-size: 0.8rem; color: var(--text-muted);">파일을 먼저 업로드하세요.</p>
            </div>
        </div>
    </div>

    <div id="colorCard" class="notion-card hidden">
        <div class="accordion-header" onclick="toggleAccordion('colorSettingsContainer', 'accordionArrow')">
            <div class="notion-label" style="margin-bottom: 0;">캐릭터 대사 색상 설정</div>
            <div class="accordion-icon" id="accordionArrow">▶</div>
        </div>
        <div id="colorSettingsContainer" class="accordion-content grid-config" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); margin-top: 0;"></div>
    </div>

    <div class="btn-group">
        <button id="btnProcess" class="notion-btn btn-submit">스크립트 가공 및 분류 실행</button>
        <button id="btnCopy" class="notion-btn btn-util">전체 코드 복사</button>
        <button id="btnDownload" class="notion-btn btn-util">파일로 저장</button>
    </div>

    <div id="mainOutputCard" class="notion-card">
        <div class="notion-label">메인 세션 로그 (Main)</div>
        <h2 id="roomTitle" class="output-room-title" contenteditable="true" spellcheck="false">파일을 기다리는 중...</h2>
        <div id="mainContainer" class="script-container"></div>
    </div>

    <div id="dynamicTabsOutput"></div>

    <script>
        let rawLogData = [];
        let characterColors = {}; 
        let characterAvatars = {}; 
        let detectedTabs = new Set();
        let currentFontType = "serif"; 

        const spellRules = [
            { regex: /됫/g, fix: "됐" }, { regex: /됬/g, fix: "됐" }, { regex: /않하고/g, fix: "안 하고" }, 
            { regex: /않돼/g, fix: "안 돼" }, { regex: /구지/g, fix: "굳이" }, { regex: /할께/g, fix: "할게" }
        ];

        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            content.classList.toggle('open');
            arrow.innerText = content.classList.contains('open') ? '▼' : '▶';
        }

        document.querySelectorAll('input[name="fontPreset"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentFontType = e.target.value;
                const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";
                document.documentElement.style.setProperty('--current-font', fontValue);
                
                document.querySelectorAll('.notion-block').forEach(el => {
                    el.style.fontFamily = fontValue;
                });
                document.getElementById('roomTitle').style.fontFamily = fontValue;
            });
        });

        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                
                document.getElementById('roomTitle').innerText = file.name.replace(/\.html$/i, "").replace(/\[all\]$/i, "").trim();

                const paragraphs = doc.querySelectorAll('p');
                rawLogData = [];
                detectedTabs.clear();
                const uniqueCharacters = new Set();

                paragraphs.forEach(p => {
                    let avatarSrc = p.querySelector('img')?.getAttribute('src') || "";
                    let color = p.querySelector('span[style*="color"]')?.style.color || "";
                    const text = p.textContent.trim();
                    if(!text) return;

                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim();
                        let charName = match[2].trim();
                        let msgBody = match[3].trim();
                        const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                        if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                        detectedTabs.add(tabName);
                        if(charName.toUpperCase() === "SYSTEM" || charName === "시스템") {
                            rawLogData.push({ tab: "시스템", name: "", message: msgBody, rawColor: "", avatar: "" });
                        } else {
                            rawLogData.push({ tab: tabName, name: charName, message: msgBody, rawColor: color, avatar: avatarSrc });
                            uniqueCharacters.add(charName);
                            if(color && !characterColors[charName]) characterColors[charName] = rgbToHex(color);
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        }
                    } else {
                        rawLogData.push({ tab: "시스템", name: "", message: text, rawColor: "", avatar: "" });
                    }
                });

                buildFilters();
                buildColorSettings(uniqueCharacters);
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters');
            container.innerHTML = "";
            Array.from(detectedTabs).sort().forEach(tab => {
                const label = document.createElement('label');
                label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        function buildColorSettings(charSet) {
            const container = document.getElementById('colorSettingsContainer');
            container.innerHTML = "";
            if(charSet.size === 0) { document.getElementById('colorCard').classList.add('hidden'); return; }
            charSet.forEach(name => {
                const row = document.createElement('div');
                row.className = "color-setting-row";
                row.innerHTML = `<span>${name}</span><input type="color" value="${characterColors[name] || '#ffffff'}" onchange="characterColors['${name}'] = this.value">`;
                container.appendChild(row);
            });
            document.getElementById('colorCard').classList.remove('hidden');
        }

        function rgbToHex(rgb) {
            if(!rgb || !rgb.startsWith('rgb')) return rgb || "#ffffff";
            const parts = rgb.match(/\d+/g);
            return parts ? "#" + parts.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('') : "#ffffff";
        }

        function checkSpellErrors(text) {
            let suggestions = [];
            spellRules.forEach(rule => { if(rule.regex.test(text)) suggestions.push(`'${rule.fix}' 추천`); });
            return suggestions.length > 0 ? `<span class="checker-badge" draggable="false">⚠️ ${suggestions.join(', ')}</span>` : '';
        }

        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('파일을 로드하세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            
            const mainContainer = document.getElementById('mainContainer');
            const dynamicTabsOutput = document.getElementById('dynamicTabsOutput');
            mainContainer.innerHTML = "";
            dynamicTabsOutput.innerHTML = "";

            const tabGroups = {};
            selectedTabs.forEach(t => {
                if(t.includes('메인') || t.toLowerCase() === 'main') {
                    tabGroups[t] = mainContainer;
                } else {
                    const card = document.createElement('div');
                    card.className = "notion-card";
                    const id = `tab_sec_${t}`;
                    card.innerHTML = `
                        <div class="accordion-header" onclick="toggleAccordion('${id}', 'arr_${id}')">
                            <div class="notion-label" style="margin-bottom:0;">[${t}] 채널 로그</div>
                            <div class="accordion-icon" id="arr_${id}">▶</div>
                        </div>
                        <div id="${id}" class="accordion-content script-container"></div>`;
                    dynamicTabsOutput.appendChild(card);
                    tabGroups[t] = card.querySelector('.accordion-content');
                }
            });

            let lastSpeakers = {}; 
            const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";

            rawLogData.forEach(log => {
                if(log.tab !== "시스템" && !selectedTabs.includes(log.tab)) return;
                
                const target = tabGroups[log.tab] || mainContainer;
                const isNarrator = narrator && log.name === narrator;
                const isSys = log.tab === "시스템";
                const currentSpeaker = log.name;

                let forceShowName = false;
                if (!isSys && !isNarrator && (lastSpeakers[log.tab] === "__SYS__" || lastSpeakers[log.tab] === "__NARR__")) {
                    forceShowName = true;
                }

                if (!isNarrator && !isSys && lastSpeakers[log.tab] && lastSpeakers[log.tab] !== currentSpeaker) {
                    const divider = document.createElement('div');
                    divider.className = "character-divider";
                    target.appendChild(divider);
                }

                let isSameSpeaker = (!forceShowName && !isNarrator && !isSys && lastSpeakers[log.tab] === currentSpeaker);
                
                if (isSys) lastSpeakers[log.tab] = "__SYS__";
                else if (isNarrator) lastSpeakers[log.tab] = "__NARR__";
                else lastSpeakers[log.tab] = currentSpeaker;

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = currentSpeaker;
                row.dataset.tab = log.tab;

                let msgClass = "notion-block";
                if(log.message.includes('🎲') || log.message.includes('->')) msgClass += " state-dice";
                if(isSys) msgClass += " state-system";
                if(isNarrator) msgClass += " state-narrator";

                let inner = "";
                if(!isNarrator && !isSys) {
                    if(!isSameSpeaker) {
                        const avatar = characterAvatars[currentSpeaker] || log.avatar;
                        inner += avatar ? `<img src="${avatar}" class="avatar-box">` : `<div class="avatar-box" style="background:#333"></div>`;
                    } else {
                        inner += `<div class="avatar-placeholder"></div>`;
                    }
                    inner += `<div style="flex:1;">
                        ${!isSameSpeaker ? `<span class="char-name" style="color:${characterColors[currentSpeaker] || 'inherit'}">${currentSpeaker}</span>` : ''}
                        ${checkSpellErrors(log.message)}
                        <div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>
                    </div>`;
                } else {
                    inner += `<div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>`;
                }
                
                inner += `<button class="row-control" onclick="this.parentElement.remove()">✕</button>`;
                row.innerHTML = inner;
                target.appendChild(row);
            });
        });

        function buildFinal() {
            const finalTitle = document.getElementById('roomTitle').innerText.trim();
            const chosenFontStack = currentFontType === "serif" ? `'Hina Mincho', 'Noto Serif KR', serif` : `'Noto Sans KR', sans-serif`;
            
            let output = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${finalTitle}</title>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                body { background:#191919; color:rgba(255,255,255,0.85); font-family: 'Noto Sans KR', sans-serif; max-width:750px; margin:0 auto; padding:30px 20px; }
                h1 { font-family: ${chosenFontStack}; font-size:1.8rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:12px; margin-bottom:20px; }
                .script-box { display: flex; flex-direction: column; gap: 2px; }
                .row { display:flex; align-items:flex-start; gap:8px; padding: 2px 4px; }
                .avatar { width:28px; height:28px; border-radius:4px; object-fit:cover; flex-shrink:0; }
                .name { font-size:0.8rem; font-weight:700; margin-bottom:1px; display:block; font-family: 'Noto Sans KR', sans-serif; }
                .msg { font-family: ${chosenFontStack}; font-size:0.9rem; line-height:1.4; white-space:pre-wrap; word-break:break-all; flex:1; }
                .narrator { text-align:center; font-weight:600; font-style:italic; opacity:0.7; padding:3px 10px; font-size:0.9rem; margin: 8px 0; }
                .system { color:#777; font-size:0.8rem; font-family: 'Noto Sans KR', sans-serif; }
                .dice { background:rgba(239,68,68,0.1); color:#f87171; border-left:2px solid #f87171; padding:2px 6px; border-radius:4px; font-family: 'Noto Sans KR', sans-serif; }
                .divider { border-top:1px solid rgba(255,255,255,0.04); margin:4px 0 2px 0; }
                details { background:#222; border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:12px; margin-top:16px; }
                summary { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.5); cursor:pointer; }
            </style></head><body><h1>${finalTitle}</h1><div class="script-box">`;

            function processContainer(nodes) {
                let res = ""; let last = "";
                nodes.forEach(el => {
                    if(el.classList.contains('character-divider')) { res += '<div class="divider"></div>'; return; }
                    const isNarr = el.querySelector('.state-narrator');
                    const isDice = el.querySelector('.state-dice');
                    const isSys = el.querySelector('.state-system');
                    const spk = el.dataset.speaker;
                    const same = (last === spk && !isNarr && !isSys);
                    last = isNarr ? "__N__" : (isSys ? "__S__" : spk);

                    res += '<div class="row">';
                    if(!isNarr && !isSys) {
                        const img = el.querySelector('.avatar-box')?.src;
                        if(img && !same) res += `<img src="${img}" class="avatar">`;
                        else if(!same) res += `<div class="avatar" style="background:#333"></div>`;
                        else res += `<div style="width:28px;flex-shrink:0"></div>`;
                        res += '<div>';
                        if(!same) res += `<span class="name" style="color:${el.querySelector('.char-name')?.style.color}">${spk}</span>`;
                        res += `<div class="msg ${isDice?'dice':''}">${el.querySelector('.notion-block').innerText}</div></div>`;
                    } else {
                        res += `<div class="msg ${isNarr?'narrator':(isSys?'system':'')}">${el.querySelector('.notion-block').innerText}</div>`;
                    }
                    res += '</div>';
                });
                return res;
            }

            output += processContainer(document.querySelectorAll('#mainContainer > div'));
            output += '</div>';
            
            document.querySelectorAll('#dynamicTabsOutput > .notion-card').forEach(card => {
                const title = card.querySelector('.notion-label').innerText;
                const nodes = card.querySelectorAll('.accordion-content > div');
                output += `<details><summary>${title}</summary><div class="script-box" style="margin-top:8px;">${processContainer(nodes)}</div></details>`;
            });

            output += '</body></html>';
            return output;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinal()).then(() => alert('코드가 복사되었습니다.'));
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinal()], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${document.getElementById('roomTitle').innerText}.html`);
            link.click();
        });

        function escapeHtml(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
