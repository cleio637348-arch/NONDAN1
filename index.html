<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 코코포 로그 백업기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 기본 인터페이스 (차분한 노션 스타일 다크 모드) */
            --bg-main: #191919;
            --bg-surface: #202020;
            --bg-input: #252525;
            --border-notion: rgba(255, 255, 255, 0.06);
            --text-main: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.35);
            --text-link: #5c93e2;

            /* 폰트 프리셋 */
            --font-serif: "Hina Mincho", "Noto Serif KR", serif;
            --font-sans: "Noto Sans KR", "Inter", sans-serif;
            --current-font: var(--font-sans);

            /* 차분하고 명도가 낮추어진 로그 전용 템플릿 색상 세팅 */
            --script-bg: #1e1e1e;
            --script-text: rgba(255, 255, 255, 0.85);
            --script-name: #cccccc;
            --script-narrator: #999999;
            --script-sys: #666666;
            --script-border: #2d2d2d;
        }

        body {
            font-family: var(--font-sans);
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 16px;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-notion);
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            margin: 0 0 6px 0;
        }

        header p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .notion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-notion);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .notion-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .output-room-title {
            font-family: var(--font-sans);
            font-size: 1.4rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            margin: 0 0 16px 0;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .accordion-icon { font-size: 0.8rem; color: var(--text-muted); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; }
        .accordion-content.open { max-height: none; margin-top: 14px; }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        @media (min-width: 600px) {
            .grid-config { grid-template-columns: repeat(2, 1fr); }
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        input[type="text"], input[type="file"] {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-notion);
            border-radius: 6px; color: var(--text-main); font-size: 0.85rem; padding: 10px; box-sizing: border-box; outline: none;
        }

        .switch-group {
            display: flex; gap: 16px; background: var(--bg-input); padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border-notion);
        }
        .switch-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; color: var(--text-main); }
        .switch-item input { accent-color: var(--text-link); cursor: pointer; }

        .filter-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 6px; }
        .filter-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; }
        .filter-item input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--text-link); }

        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .notion-btn {
            background: none; border: 1px solid var(--border-notion); color: var(--text-main);
            border-radius: 6px; cursor: pointer; padding: 10px 16px; font-size: 0.85rem; transition: 0.2s; font-weight: 600;
        }
        .btn-submit { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); flex: 2; }
        .btn-submit:hover { background: rgba(255, 255, 255, 0.08); }
        .btn-util { flex: 1; border-color: rgba(255,255,255,0.08); color: var(--text-main); }
        .btn-util:hover { background: rgba(255, 255, 255, 0.04); }

        /* 대화 스크립트 출력 컨테이너 */
        .script-container {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background-color: var(--script-bg);
            padding: 14px;
            border-radius: 6px;
            border: 1px solid var(--script-border);
        }

        /* [요구사항] 테이블 구조로 유연하게 변형하여 우측에 del 독립 칸 마련 */
        .notion-row { 
            display: flex; 
            align-items: flex-start; 
            gap: 10px; 
            padding: 3px 6px; 
            border-radius: 4px;
            transition: background 0.15s;
        }
        .notion-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .avatar-box { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #2d2d2d; border: 1px solid rgba(255,255,255,0.05); }
        .avatar-placeholder { width: 30px; flex-shrink: 0; }
        
        /* 실제 대화 텍스트 바디 */
        .notion-body-cell {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .notion-block {
            font-size: 0.9rem; 
            line-height: 1.5; 
            word-break: break-all; 
            outline: none; 
            color: var(--script-text); 
            white-space: pre-wrap;
            font-family: var(--current-font);
        }
        
        .char-name { 
            font-size: 0.8rem; 
            font-weight: 700; 
            margin-bottom: 2px; 
            display: block; 
            color: var(--script-name); 
            font-family: var(--font-sans);
            opacity: 0.85;
        }

        /* 상태 템플릿 색상 서식 */
        .state-narrator { 
            text-align: center; 
            font-weight: 500; 
            color: var(--script-narrator) !important; 
            width: 100%; 
            margin: 6px 0; 
            font-size: 0.9rem; 
        }
        
        .state-system { font-family: var(--font-sans); font-size: 0.8rem; color: var(--script-sys) !important; }

        /* [요구사항] 주사위 강조 완전 제외 -> 일반 일반 텍스트 블록과 완전 일치화 */
        .state-dice { background: none !important; color: var(--script-text) !important; border: none !important; padding: 0 !important; }

        /* [요구사항] 우측 분리형 del 독립 조작 칸 */
        .control-cell {
            width: 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            align-self: center;
            flex-shrink: 0;
        }

        .row-control { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-muted); 
            cursor: pointer; 
            font-size: 0.7rem; 
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.15s;
            font-family: var(--font-sans);
        }
        .notion-row:hover .row-control { opacity: 1; }
        .row-control:hover { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); border-color: rgba(255, 107, 107, 0.2); }
        
        .character-divider { border-top: 1px solid rgba(255, 255, 255, 0.03); margin: 6px 0 3px 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>논단군 코코포 로그 백업기</h1>
        <p>불필요한 강조 없이 정갈하게 세션 로그를 정돈합니다</p>
    </header>

    <div class="notion-card">
        <div class="notion-label">설정 센터</div>
        <div class="grid-config">
            <div class="input-group">
                <span>1. 로그 파일 업로드 (.html)</span>
                <input id="logFile" type="file" accept=".html">
            </div>
            <div class="input-group">
                <span>2. 서술자 이름 지정</span>
                <input id="narratorName" type="text" placeholder="예: GM 또는 서술자">
            </div>
        </div>

        <div class="grid-config" style="margin-bottom: 12px;">
            <div class="input-group">
                <span>3. 본문 스타일 선택</span>
                <div class="switch-group" id="themeSwitchGroup">
                    <label class="switch-item">
                        <input type="radio" name="colorTheme" value="roll20" checked> 차분한 모노톤
                    </label>
                    <label class="switch-item">
                        <input type="radio" name="colorTheme" value="ccfolia"> 클래식 블랙
                    </label>
                </div>
            </div>
            <div class="input-group">
                <span>4. 서체 선택</span>
                <div class="switch-group">
                    <label class="switch-item">
                        <input type="radio" name="fontPreset" value="sans" checked> 고딕
                    </label>
                    <label class="switch-item">
                        <input type="radio" name="fontPreset" value="serif"> 명조
                    </label>
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <span>5. 탭 필터링</span>
            <div id="dynamicFilters" class="filter-container">
                <p style="font-size: 0.8rem; color: var(--text-muted);">파일을 먼저 업로드하세요.</p>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="btnProcess" class="notion-btn btn-submit">실행</button>
        <button id="btnCopy" class="notion-btn btn-util">코드 복사</button>
        <button id="btnDownload" class="notion-btn btn-util">파일로 저장</button>
    </div>

    <div id="mainOutputCard" class="notion-card">
        <div class="notion-label">메인 세션 로그 (Main)</div>
        <h2 id="roomTitle" class="output-room-title" contenteditable="true" spellcheck="false"> </h2>
        <div id="mainContainer" class="script-container"></div>
    </div>

    <div id="dynamicTabsOutput"></div>

    <script>
        let rawLogData = [];
        let characterAvatars = {}; 
        let detectedTabs = new Set();
        let currentFontType = "sans"; 
        let currentColorTheme = "roll20";

        const themeProfiles = {
            roll20: {
                bg: "#1e1e1e", text: "rgba(255,255,255,0.85)", name: "#cccccc", narrator: "#999999", sys: "#555555", border: "#2d2d2d"
            },
            ccfolia: {
                bg: "#141414", text: "rgba(255,255,255,0.8)", name: "#888888", narrator: "#aaaaaa", sys: "#444444", border: "#222222"
            }
        };

        function applyColorTheme(themeName) {
            const p = themeProfiles[themeName];
            const root = document.documentElement;
            root.style.setProperty('--script-bg', p.bg);
            root.style.setProperty('--script-text', p.text);
            root.style.setProperty('--script-name', p.name);
            root.style.setProperty('--script-narrator', p.narrator);
            root.style.setProperty('--script-sys', p.sys);
            root.style.setProperty('--script-border', p.border);
        }

        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            content.classList.toggle('open');
            const arrow = document.getElementById(arrowId);
            arrow.innerText = content.classList.contains('open') ? '▼' : '▶';
        }

        document.querySelectorAll('input[name="colorTheme"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentColorTheme = e.target.value;
                applyColorTheme(currentColorTheme);
            });
        });

        applyColorTheme("roll20");

        document.querySelectorAll('input[name="fontPreset"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentFontType = e.target.value;
                const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";
                document.documentElement.style.setProperty('--current-font', fontValue);
                document.querySelectorAll('.notion-block').forEach(el => el.style.fontFamily = fontValue);
            });
        });

        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                
                document.getElementById('roomTitle').innerText = file.name.replace(/\.html$/i, "").replace(/\[all\]$/i, "").trim();

                let elements = doc.querySelectorAll('p, div, span');
                rawLogData = [];
                detectedTabs.clear();

                elements.forEach(p => {
                    if (p.children.length > 0 && p.tagName !== 'P') {
                        if (p.querySelector('p')) return;
                    }

                    const text = p.textContent.trim();
                    if(!text || text.length < 2) return;

                    let avatarSrc = "";
                    let imgEl = p.querySelector('img') || p.parentElement?.querySelector(`img`) || p.previousElementSibling?.querySelector('img');
                    if (imgEl && imgEl.getAttribute('src')) {
                        avatarSrc = imgEl.getAttribute('src');
                    }

                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim();
                        let charName = match[2].trim();
                        let msgBody = match[3].trim();
                        
                        const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                        if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                        detectedTabs.add(tabName);
                        if(charName.toUpperCase() === "SYSTEM" || charName === "시스템") {
                            rawLogData.push({ tab: "시스템", name: "", message: msgBody, avatar: "" });
                        } else {
                            rawLogData.push({ tab: tabName, name: charName, message: msgBody, avatar: avatarSrc });
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        }
                    } else {
                        const simpleMatch = text.match(/^([^:]+)\s*:\s*([\s\S]*)$/);
                        if(simpleMatch) {
                            let charName = simpleMatch[1].trim();
                            let msgBody = simpleMatch[2].trim();
                            
                            const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                            if(timeMatch) msgBody = msgBody.replace(timeMatch[0], "").trim();

                            detectedTabs.add("Main");
                            rawLogData.push({ tab: "Main", name: charName, message: msgBody, avatar: avatarSrc });
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        } else {
                            if(!text.startsWith("http") && text.length > 1) {
                                rawLogData.push({ tab: "시스템", name: "", message: text, avatar: "" });
                            }
                        }
                    }
                });

                if(rawLogData.length === 0) {
                    elements.forEach(p => {
                        if(p.textContent.trim()) rawLogData.push({ tab: "Main", name: "로그", message: p.textContent.trim(), avatar: "" });
                    });
                    detectedTabs.add("Main");
                }

                buildFilters();
            };
            reader.readAsText(file, 'UTF-8');
        });

        function buildFilters() {
            const container = document.getElementById('dynamicFilters');
            container.innerHTML = "";
            if(detectedTabs.size === 0) {
                container.innerHTML = `<p style="font-size: 0.8rem; color: var(--text-muted);">감지된 탭이 없습니다.</p>`;
                return;
            }
            Array.from(detectedTabs).sort().forEach(tab => {
                const label = document.createElement('label');
                label.className = "filter-item";
                label.innerHTML = `<input type="checkbox" class="tab-chk" value="${tab}" checked> <span>${tab}</span>`;
                container.appendChild(label);
            });
        }

        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('파일을 먼저 업로드해 주세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const selectedTabs = Array.from(document.querySelectorAll('.tab-chk:checked')).map(c => c.value);
            
            const mainContainer = document.getElementById('mainContainer');
            const dynamicTabsOutput = document.getElementById('dynamicTabsOutput');
            mainContainer.innerHTML = "";
            dynamicTabsOutput.innerHTML = "";

            const tabGroups = {};
            selectedTabs.forEach(t => {
                if(t.includes('메인') || t.toLowerCase() === 'main' || selectedTabs.length === 1) {
                    tabGroups[t] = mainContainer;
                } else {
                    const card = document.createElement('div');
                    card.className = "notion-card";
                    const id = `tab_sec_${t.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    card.innerHTML = `
                        <div class="accordion-header" onclick="toggleAccordion('${id}', 'arr_${id}')">
                            <div class="notion-label" style="margin-bottom:0;">[${t}] 채널 로그</div>
                            <div class="accordion-icon" id="arr_${id}">▶</div>
                        </div>
                        <div id="${id}" class="accordion-content script-container" style="margin-top:10px;"></div>`;
                    dynamicTabsOutput.appendChild(card);
                    tabGroups[t] = card.querySelector('.accordion-content');
                }
            });

            let lastSpeakers = {}; 
            const fontValue = currentFontType === "serif" ? "var(--font-serif)" : "var(--font-sans)";

            rawLogData.forEach(log => {
                if(log.tab !== "시스템" && !selectedTabs.includes(log.tab) && selectedTabs.length > 0) return;
                
                const target = tabGroups[log.tab] || mainContainer;
                const isNarrator = narrator && log.name === narrator;
                const isSys = log.tab === "시스템" || log.name === "";
                const currentSpeaker = log.name;

                let forceShowName = false;
                if (!isSys && !isNarrator && (lastSpeakers[log.tab] === "__SYS__" || lastSpeakers[log.tab] === "__NARR__")) {
                    forceShowName = true;
                }

                if (!isNarrator && !isSys && lastSpeakers[log.tab] && lastSpeakers[log.tab] !== currentSpeaker) {
                    const divider = document.createElement('div');
                    divider.className = "character-divider";
                    target.appendChild(divider);
                }

                let isSameSpeaker = (!forceShowName && !isNarrator && !isSys && lastSpeakers[log.tab] === currentSpeaker);
                
                if (isSys) lastSpeakers[log.tab] = "__SYS__";
                else if (isNarrator) lastSpeakers[log.tab] = "__NARR__";
                else lastSpeakers[log.tab] = currentSpeaker;

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = currentSpeaker;
                row.dataset.tab = log.tab;

                let msgClass = "notion-block";
                if(isSys) msgClass += " state-system";
                if(isNarrator) msgClass += " state-narrator";

                let inner = "";
                if(!isNarrator && !isSys) {
                    if(!isSameSpeaker) {
                        const avatar = characterAvatars[currentSpeaker] || log.avatar;
                        inner += avatar ? `<img src="${avatar}" class="avatar-box" data-raw-src="${avatar}">` : `<div class="avatar-box"></div>`;
                    } else {
                        inner += `<div class="avatar-placeholder"></div>`;
                    }
                    inner += `<div class="notion-body-cell">
                        ${!isSameSpeaker ? `<span class="char-name">${currentSpeaker}</span>` : ''}
                        <div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div>
                    </div>`;
                } else {
                    inner += `<div class="notion-body-cell"><div class="${msgClass}" style="font-family: ${fontValue}" contenteditable="true" spellcheck="false">${escapeHtml(log.message)}</div></div>`;
                }
                
                // [요구사항] 단독 구조 칸(control-cell) 내부 배치 분리형 버튼 
                inner += `<div class="control-cell"><button class="row-control" onclick="this.parentElement.parentElement.remove()">del</button></div>`;
                row.innerHTML = inner;
                target.appendChild(row);
            });
        });

        function buildFinal() {
            const finalTitle = document.getElementById('roomTitle').innerText.trim() || "TRPG 로그 백업 스크립트";
            const chosenFontStack = currentFontType === "serif" ? `'Hina Mincho', 'Noto Serif KR', serif` : `'Noto Sans KR', sans-serif`;
            const p = themeProfiles[currentColorTheme];

            let output = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${finalTitle}</title>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hina+Mincho&display=swap');
                body { background:#191919; color:rgba(255,255,255,0.8); font-family: 'Noto Sans KR', sans-serif; max-width:800px; margin:0 auto; padding:30px 20px; }
                h1 { font-family: 'Noto Sans KR', sans-serif; font-size:1.3rem; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:12px; margin-bottom:20px; color:rgba(255,255,255,0.9); }
                .script-box { display: flex; flex-direction: column; gap: 1px; background:${p.bg}; padding:14px; border-radius:6px; border:1px solid ${p.border}; }
                .row { display:flex; align-items:flex-start; gap:10px; padding: 3px 6px; }
                .avatar { width:30px; height:30px; border-radius:4px; object-fit:cover; flex-shrink:0; background:#2d2d2d; border:1px solid rgba(255,255,255,0.05); }
                .name { font-size:0.8rem; font-weight:700; margin-bottom:2px; display:block; color:${p.name}; font-family: 'Noto Sans KR', sans-serif; opacity:0.85; }
                .msg { font-family: ${chosenFontStack}; font-size:0.9rem; line-height:1.5; white-space:pre-wrap; word-break:break-all; flex:1; color:${p.text}; }
                .narrator { text-align:center; font-weight:500; padding:3px 10px; font-size:0.9rem; margin: 6px 0; color:${p.narrator}; }
                .system { color:${p.sys}; font-size:0.8rem; font-family: 'Noto Sans KR', sans-serif; }
                .divider { border-top: 1px solid rgba(255,255,255,0.03); margin:6px 0 3px 0; }
                details { background:#202020; border:1px solid rgba(255,255,255,0.06); border-radius:8px; padding:12px; margin-top:16px; }
                summary { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.35); cursor:pointer; }
            </style></head><body><h1>${finalTitle}</h1><div class="script-box">`;

            function processContainer(nodes) {
                let res = ""; let last = "";
                nodes.forEach(el => {
                    if(el.classList.contains('character-divider')) { res += '<div class="divider"></div>'; return; }
                    const isNarr = el.querySelector('.state-narrator');
                    const isSys = el.querySelector('.state-system');
                    const spk = el.dataset.speaker || "";
                    const same = (last === spk && !isNarr && !isSys);
                    last = isNarr ? "__N__" : (isSys ? "__S__" : spk);

                    res += '<div class="row">';
                    if(!isNarr && !isSys) {
                        const imgBox = el.querySelector('.avatar-box');
                        const img = imgBox?.getAttribute('src') || imgBox?.dataset.rawSrc;
                        
                        if(img && !same) res += `<img src="${img}" class="avatar">`;
                        else if(!same) res += `<div class="avatar"></div>`;
                        else res += `<div style="width:30px;flex-shrink:0"></div>`;
                        
                        res += '<div style="flex:1;">';
                        if(!same) res += `<span class="name">${spk}</span>`;
                        res += `<div class="msg">${el.querySelector('.notion-block').innerText}</div></div>`;
                    } else {
                        const contentNode = el.querySelector('.notion-block');
                        res += `<div class="msg ${isNarr?'narrator':(isSys?'system':'')}">${contentNode ? contentNode.innerText : el.textContent}</div>`;
                    }
                    res += '</div>';
                });
                return res;
            }

            output += processContainer(document.querySelectorAll('#mainContainer > div'));
            output += '</div>';
            
            document.querySelectorAll('#dynamicTabsOutput > .notion-card').forEach(card => {
                const title = card.querySelector('.notion-label').innerText;
                const nodes = card.querySelectorAll('.script-container > div');
                output += `<details><summary>${title}</summary><div class="script-box" style="margin-top:8px;">${processContainer(nodes)}</div></details>`;
            });

            output += '</body></html>';
            return output;
        }

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(buildFinal()).then(() => alert('코드가 복사되었습니다.'));
        });

        document.getElementById('btnDownload').addEventListener('click', () => {
            const blob = new Blob([buildFinal()], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${document.getElementById('roomTitle').innerText || 'log'}.html`);
            link.click();
        });

        function escapeHtml(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
