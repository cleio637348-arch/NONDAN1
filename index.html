<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논단군 스크립트 정리 Pro</title>
    <style>
        /* 제공된 다크 프리미엄 테마 적용 */
        :root {
            --bg-main: #191919;
            --bg-surface: #202020;
            --bg-input: #252525;
            --border-notion: rgba(255, 255, 255, 0.07);
            --text-main: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.4);
            
            /* 하이라이트 컬러 */
            --bg-kp: rgba(28, 131, 100, 0.15); 
            --text-kp: #4ade80;
            
            --bg-check: rgba(239, 68, 68, 0.15); 
            --text-check: #f87171;
            
            --bg-handout: rgba(234, 179, 8, 0.12); 
            --text-handout: #fde047;
            
            --bg-link: rgba(59, 130, 246, 0.15); 
            --text-link: #60a5fa;
            
            --bg-copied: rgba(46, 170, 220, 0.25);
        }

        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 16px;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-notion);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin: 0 0 6px 0;
            letter-spacing: -0.03em;
            outline: none;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .notion-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-notion);
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .notion-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        @media (min-width: 600px) {
            .grid-config { grid-template-columns: repeat(2, 1fr); }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group span {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .checkbox-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 6px;
        }

        .translate-option-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .translate-option-box input[type="checkbox"] {
            accent-color: var(--text-kp);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        input[type="text"], input[type="file"], input[type="color"] {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-notion);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 0.85rem;
            padding: 10px 12px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="file"] {
            padding: 7px 12px;
            cursor: pointer;
        }

        input[type="color"] {
            padding: 2px;
            height: 38px;
            cursor: pointer;
        }

        /* 캐릭터 색상 지정 패널 */
        .color-setting-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            background: var(--bg-input);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-notion);
        }
        .color-setting-row span {
            font-size: 0.85rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .color-setting-row input[type="color"] {
            width: 50px;
            flex-shrink: 0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .notion-btn {
            background: none;
            border: 1px solid var(--border-notion);
            color: var(--text-main);
            border-radius: 4px;
            cursor: pointer;
            padding: 11px 16px;
            font-size: 0.85rem;
            transition: background 0.1s;
            font-weight: 600;
        }

        .btn-submit {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-submit:hover { background: rgba(255, 255, 255, 0.08); }

        .btn-download {
            flex: 1;
            background: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.25);
            color: var(--text-link);
        }
        .btn-download:hover { background: rgba(96, 165, 250, 0.15); }

        /* 출력 행 구조 */
        .notion-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.01);
            padding-bottom: 6px;
        }

        .avatar-box {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: var(--bg-input);
            border: 1px solid var(--border-notion);
        }
        .avatar-placeholder {
            width: 36px;
            flex-shrink: 0;
        }

        .notion-block {
            flex: 1;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-break: break-all;
            outline: none;
            color: var(--text-main);
        }
        .notion-block:focus {
            background: var(--bg-input);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* 발화 캐릭터 이름 스타일 */
        .char-name {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
        }

        /* 자동 감지 특수 스타일 정의 */
        .state-narrator { text-align: center; font-weight: bold; font-style: italic; color: rgba(255,255,255,0.7); width: 100%; margin: 12px 0; }
        .state-system { background-color: var(--bg-surface); border-left: 3px solid var(--text-muted); opacity: 0.7; }
        .state-dice { background-color: var(--bg-check); color: var(--text-check); border-left: 3px solid var(--text-check); font-weight: 500; }

        /* 행 제어 */
        .row-control {
            padding: 6px 10px;
            border: 1px solid var(--border-notion);
            background: rgba(255,255,255,0.02);
            color: var(--text-check);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .row-control:hover { background: rgba(239, 68, 68, 0.1); }

        /* 대화 전환 구분선 */
        .character-divider {
            border-top: 1px dashed var(--border-notion);
            margin: 16px 0 12px 0;
            width: 100%;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1 id="roomTitle" contenteditable="true" spellcheck="false">논단군 스크립트 정리</h1>
        <p>TRPG 텍스트 자동 정리 시스템 (PC / 모바일 공용)</p>
    </header>

    <div class="notion-card">
        <div class="notion-label">설정 및 필터 제어</div>
        
        <div class="grid-config">
            <div class="input-group">
                <span>1. 로그 원본 파일 (.html)</span>
                <input id="logFile" type="file" accept=".html">
            </div>
            <div class="input-group">
                <span>2. 서술자 캐릭터 이름 지정</span>
                <input id="narratorName" type="text" placeholder="예: GM 또는 서술자">
            </div>
        </div>

        <div class="input-group" style="margin-top: 10px;">
            <span>3. 추출 및 활성화할 채팅 탭 필터</span>
            <div class="checkbox-container">
                <label class="translate-option-box"><input type="checkbox" id="tabMain" checked> 메인</label>
                <label class="translate-option-box"><input type="checkbox" id="tabSub" checked> 잡담</label>
                <label class="translate-option-box"><input type="checkbox" id="tabInfo" checked> 정보</label>
                <label class="translate-option-box"><input type="checkbox" id="tabPrivate" checked> 프라이빗</label>
            </div>
        </div>
    </div>

    <div id="colorCard" class="notion-card hidden">
        <div class="notion-label">캐릭터별 이름 색상 커스텀</div>
        <div id="colorSettingsContainer" class="grid-config" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
            </div>
    </div>

    <div class="btn-group" style="margin-bottom: 20px;">
        <button id="btnProcess" class="notion-btn btn-submit">스크립트 변환</button>
        <button id="btnDownload" class="notion-btn btn-download">정제본 HTML 저장</button>
    </div>

    <div class="notion-card">
        <div class="panel-header">
            <div class="notion-label" id="statusLabel">편집 데이터 정렬창</div>
        </div>
        <div id="editorContainer">
            <p style="color: var(--text-muted); text-align: center; font-size: 0.85rem; padding: 40px 0;">파일을 등록하면 정렬창이 활성화됩니다.</p>
        </div>
    </div>

    <script>
        let rawLogData = [];
        let characterColors = {}; // 캐릭터별 색상 저장 매핑 객체
        let characterAvatars = {}; // 캐릭터별 인장 이미지 저장 매핑 객체

        // 1. 코코포리아 파일 로드 및 메타데이터 분석
        document.getElementById('logFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(event.target.result, 'text/html');
                
                // 룸 이름 인식
                const titleNode = doc.querySelector('title');
                if(titleNode && titleNode.innerText.trim()) {
                    document.getElementById('roomTitle').innerText = titleNode.innerText.trim();
                } else {
                    document.getElementById('roomTitle').innerText = file.name.replace(/\.[^/.]+$/, "");
                }

                const paragraphs = doc.querySelectorAll('p');
                rawLogData = [];
                const uniqueCharacters = new Set();

                paragraphs.forEach(p => {
                    const text = p.textContent.trim();
                    if(!text) return;

                    // 인장 이미지 추출
                    let avatarSrc = "";
                    const img = p.querySelector('img');
                    if(img) avatarSrc = img.getAttribute('src') || "";

                    // 원본 컬러 추출
                    let color = "";
                    const span = p.querySelector('span[style*="color"]');
                    if(span) color = span.style.color;

                    const match = text.match(/^\[([^\]]+)\]\s*([^:]+)\s*:\s*([\s\S]*)$/);
                    if (match) {
                        let tabName = match[1].trim();
                        let charName = match[2].trim();
                        let msgBody = match[3].trim();

                        // 시간 정보 제거
                        const timeMatch = msgBody.match(/\s*(\d{4}\/\d{2}\/\d{2}\s+\d{2}:\d{2}:\d{2}|\d{2}:\d{2})$/);
                        if(timeMatch) {
                            msgBody = msgBody.replace(timeMatch[0], "").trim();
                        }

                        rawLogData.push({ tab: tabName, name: charName, message: msgBody, rawColor: color, avatar: avatarSrc });
                        
                        if(charName !== "SYSTEM") {
                            uniqueCharacters.add(charName);
                            if(color && !characterColors[charName]) characterColors[charName] = rgbToHex(color) || "#ffffff";
                            if(avatarSrc && !characterAvatars[charName]) characterAvatars[charName] = avatarSrc;
                        }
                    } else {
                        rawLogData.push({ tab: "시스템", name: "SYSTEM", message: text, rawColor: "", avatar: "" });
                    }
                });

                // 캐릭터 색상 지정을 위한 동적 패널 생성
                buildColorSettings(uniqueCharacters);
                document.getElementById('statusLabel').innerText = `편집 데이터 정렬창 (총 ${rawLogData.length}행 로드됨)`;
            };
            reader.readAsText(file, 'UTF-8');
        });

        // 캐릭터 고유 컬러 설정창 빌드
        function buildColorSettings(charSet) {
            const container = document.getElementById('colorSettingsContainer');
            container.innerHTML = "";
            
            if(charSet.size === 0) {
                document.getElementById('colorCard').classList.add('hidden');
                return;
            }

            charSet.forEach(name => {
                const defaultColor = characterColors[name] || "#ffffff";
                const row = document.createElement('div');
                row.className = "color-setting-row";
                row.innerHTML = `
                    <span>${escapeHtml(name)}</span>
                    <input type="color" data-name="${escapeHtml(name)}" value="${defaultColor}" onchange="updateCharColor('${escapeHtml(name)}', this.value)">
                `;
                container.appendChild(row);
            });
            document.getElementById('colorCard').classList.remove('hidden');
        }

        function updateCharColor(name, value) {
            characterColors[name] = value;
        }

        // RGB 문자열을 HEX코드로 변경하는 헬퍼 함수
        function rgbToHex(rgb) {
            if(!rgb.startsWith('rgb')) return rgb;
            const rgbValues = rgb.match(/\d+/g);
            if(!rgbValues || rgbValues.length < 3) return null;
            return "#" + rgbValues.slice(0, 3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join('');
        }

        // 2. 스크립트 파싱 및 정렬 뷰어 가동
        document.getElementById('btnProcess').addEventListener('click', () => {
            if(rawLogData.length === 0) return alert('정리할 스크립트 파일을 먼저 업로드해 주세요.');
            
            const narrator = document.getElementById('narratorName').value.trim();
            const container = document.getElementById('editorContainer');
            container.innerHTML = ""; 

            const incMain = document.getElementById('tabMain').checked;
            const incSub = document.getElementById('tabSub').checked;
            const incInfo = document.getElementById('tabInfo').checked;
            const incPriv = document.getElementById('tabPrivate').checked;

            let lastChar = "";

            rawLogData.forEach((log) => {
                let isMain = log.tab.includes('메인') || log.tab.toLowerCase() === 'main';
                let isSub = log.tab.includes('잡담') || log.tab.toLowerCase() === 'sub' || log.tab.includes('잡');
                let isInfo = log.tab.includes('정보') || log.tab.toLowerCase() === 'info';
                let isPriv = log.tab.includes('비밀') || log.tab.includes('프라이빗') || log.tab.toLowerCase() === 'private';
                let isSys = log.tab === "시스템";

                if(isMain && !incMain) return;
                if(isSub && !incSub) return;
                if(isInfo && !incInfo) return;
                if(isPriv && !incPriv) return;

                let isNarrator = narrator && log.name === narrator;
                let isDice = log.message.includes('Choice') || log.message.includes('🎲') || /[^a-zA-Z0-9가-힣\s]+:\s*\(.*?\)\s*->/.test(log.message);

                // 캐릭터 변동 감지용 구분선 규칙
                if (!isNarrator && !isSys && lastChar && lastChar !== log.name) {
                    const divider = document.createElement('div');
                    divider.className = "character-divider";
                    container.appendChild(divider);
                }

                // 동일 캐릭터 연속 발화 시 이름/인장 노출 생략 토글 규칙 정의
                let isSameSpeaker = (!isNarrator && !isSys && lastChar === log.name);
                if (!isNarrator && !isSys) lastChar = log.name;

                const row = document.createElement('div');
                row.className = "notion-row";
                row.dataset.speaker = log.name;

                let innerStructure = "";

                if (!isNarrator) {
                    let msgClass = "notion-block";
                    if (isDice) msgClass += " state-dice";
                    if (isSys) msgClass += " state-system";

                    const chosenColor = characterColors[log.name] || log.rawColor || 'inherit';
                    const chosenAvatar = characterAvatars[log.name] || log.avatar;

                    // 아바타 인장 노출 파트 (연속 발화 시 자리 맞춤용 여백 처리)
                    if (!isSameSpeaker && chosenAvatar) {
                        innerStructure += `<img src="${chosenAvatar}" class="avatar-box" onerror="this.remove()">`;
                    } else if (!isSameSpeaker && !isSys) {
                        innerStructure += `<div class="avatar-box" style="background:#333;"></div>`;
                    } else {
                        innerStructure += `<div class="avatar-placeholder"></div>`;
                    }

                    innerStructure += `
                        <div style="flex: 1;">
                            ${(!isSys && !isSameSpeaker) ? `<span class="char-name" style="color: ${chosenColor}">${log.name}</span>` : ''}
                            <div class="${msgClass}" contenteditable="true" spellcheck="true">${escapeHtml(log.message)}</div>
                        </div>
                    `;
                } else {
                    innerStructure += `
                        <div class="notion-block state-narrator" contenteditable="true" spellcheck="true">${escapeHtml(log.message)}</div>
                    `;
                }

                innerStructure += `
                    <button class="row-control control-del" onclick="this.parentElement.remove()">✕</button>
                `;

                row.innerHTML = innerStructure;
                container.appendChild(row);
            });
        });

        // 3. 최종 정제본 빌드 아카이버 다운로드
        document.getElementById('btnDownload').addEventListener('click', () => {
            const elements = document.querySelectorAll('#editorContainer > div, #editorContainer .character-divider');
            if(elements.length === 0) return alert('추출할 가공 데이터가 없습니다.');

            const finalTitle = document.getElementById('roomTitle').innerText.trim();

            let fileOutput = `<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${finalTitle}</title>
    <style>
        body { background-color: #191919; color: rgba(255, 255, 255, 0.85); font-family: ui-sans-serif, -apple-system, system-ui, sans-serif; max-width: 700px; margin: 0 auto; padding: 40px 16px; }
        h1 { font-size: 1.6rem; font-weight: 700; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 12px; margin-bottom: 24px; }
        .row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
        .avatar { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .avatar-space { width: 36px; flex-shrink: 0; }
        .name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; display: block; }
        .msg { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: rgba(255, 255, 255, 0.85); }
        .narrator { text-align: center; font-weight: bold; font-style: italic; color: rgba(255,255,255,0.7); width: 100%; margin: 16px 0; }
        .system { background-color: #202020; border-left: 3px solid rgba(255,255,255,0.4); opacity: 0.7; padding: 6px 10px; border-radius: 4px; flex: 1; }
        .dice { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border-left: 3px solid #f87171; font-weight: 500; padding: 6px 10px; border-radius: 4px; flex: 1; }
        .divider { border-top: 1px dashed rgba(255, 255, 255, 0.07); margin: 16px 0 12px 0; width: 100%; }
    </style>
</head>
<body>
    <h1>${finalTitle}</h1>
    <div style="display: flex; flex-direction: column;">
`;

            let lastSpeakerName = "";

            elements.forEach(element => {
                if(element.classList.contains('character-divider')) {
                    fileOutput += `        <div class="divider"></div>\n`;
                    return;
                }

                const isBlockNarrator = element.querySelector('.state-narrator');
                const isBlockDice = element.querySelector('.state-dice');
                const isBlockSys = element.querySelector('.state-system');
                const currentSpeaker = element.dataset.speaker;

                fileOutput += `        <div class="row">\n`;

                if(isBlockNarrator) {
                    fileOutput += `            <div class="msg narrator">${escapeHtml(isBlockNarrator.innerText)}</div>\n`;
                    lastSpeakerName = ""; // 서술자 등장 시 이전 연속 발화 끊음
                } else {
                    let containerClass = "";
                    if(isBlockDice) containerClass = ' class="dice"';
                    if(isBlockSys) containerClass = ' class="system"';

                    let isSameAsLast = (!isBlockSys && lastSpeakerName === currentSpeaker);
                    if(!isBlockSys) lastSpeakerName = currentSpeaker;

                    // 인장 파일 바인딩
                    const imgNode = element.querySelector('.avatar-box');
                    if(imgNode && !isSameAsLast) {
                        fileOutput += `            <img src="${imgNode.src}" class="avatar">\n`;
                    } else if(!isBlockSys) {
                        fileOutput += `            <div class="avatar-space"></div>\n`;
                    }

                    fileOutput += `            <div style="flex: 1;"${containerClass}>\n`;
                    
                    const nameNode = element.querySelector('.char-name');
                    if(nameNode && !isSameAsLast) {
                        fileOutput += `                <span class="name" style="color:${nameNode.style.color}">${escapeHtml(nameNode.innerText)}</span>\n`;
                    }

                    const msgNode = element.querySelector('.notion-block');
                    if(msgNode) {
                        fileOutput += `                <div class="msg">${escapeHtml(msgNode.innerText)}</div>\n`;
                    }
                    fileOutput += `            </div>\n`;
                }

                fileOutput += `        </div>\n`;
            });

            fileOutput += `    </div>\n</body>\n</html>`;

            const blob = new Blob([fileOutput], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${finalTitle}_정리본.html`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
